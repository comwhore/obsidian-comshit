name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Build plugin
        run: |
          npm ci
          npm run build

      - name: Package release zip
        run: |
          mkdir -p comshit
          cp main.js manifest.json styles.css comshit/
          zip -r comshit.zip comshit

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            main.js
            manifest.json
            styles.css
            comshit.zip
          generate_release_notes: true
